services:
  postgres:
    container_name: incubare-data-agent-postgres
    hostname: incubare-data-agent-postgres
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-data_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    container_name: incubare-data-agent-backend
    hostname: incubare-data-agent-backend
    image: ${BACKEND_DOCKER_IMAGE:-data-agent-backend}:${BACKEND_DOCKER_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    env_file: .env
    environment:
      APP_DB_HOST: postgres
      APP_DB_PORT: 5432
      APP_DB_NAME: ${POSTGRES_DB:-data_agent}
      APP_DB_USER: ${POSTGRES_USER:-postgres}
      APP_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - uploads:/tmp/data_agent_uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  frontend:
    container_name: incubare-data-agent-frontend
    hostname: incubare-data-agent-frontend
    image: ${FRONTEND_DOCKER_IMAGE:-data-agent-frontend}:${FRONTEND_DOCKER_IMAGE_TAG:-local}
    build:
      context: ../data-agent-frontend
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    ports:
      - "${FRONTEND_PORT:-5000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  uploads:
  postgres_data:
